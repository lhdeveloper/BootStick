name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Criar pacote
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip -j "BootStick-${VERSION}.zip" BootStick.command README.md LICENSE

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: BootStick-*.zip
